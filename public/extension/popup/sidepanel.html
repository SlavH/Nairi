<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nairi AI Side Panel</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #ffffff;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .header h1 {
      font-size: 16px;
      background: linear-gradient(135deg, #e052a0, #00c9c8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .chat-container {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
    }
    
    .message {
      margin-bottom: 16px;
      padding: 12px;
      border-radius: 12px;
      max-width: 90%;
    }
    
    .message.user {
      background: linear-gradient(135deg, #e052a0, #00c9c8);
      margin-left: auto;
    }
    
    .message.assistant {
      background: rgba(255, 255, 255, 0.1);
    }
    
    .input-container {
      padding: 16px;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .input-wrapper {
      display: flex;
      gap: 8px;
    }
    
    textarea {
      flex: 1;
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 10px;
      color: white;
      font-size: 14px;
      resize: none;
      font-family: inherit;
    }
    
    textarea:focus {
      outline: none;
      border-color: #e052a0;
    }
    
    button {
      padding: 12px 16px;
      background: linear-gradient(135deg, #e052a0, #00c9c8);
      border: none;
      border-radius: 10px;
      color: white;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    
    button:hover {
      opacity: 0.9;
    }
    
    .quick-actions {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      flex-wrap: wrap;
    }
    
    .quick-action {
      padding: 6px 12px;
      background: rgba(255, 255, 255, 0.1);
      border: none;
      border-radius: 20px;
      color: white;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }
    
    .quick-action:hover {
      background: rgba(255, 255, 255, 0.2);
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>🤖 Nairi AI</h1>
  </div>
  
  <div class="chat-container" id="chatContainer">
    <div class="message assistant">
      Hi! I'm Nairi. How can I help you with this page?
    </div>
  </div>
  
  <div class="input-container">
    <div class="quick-actions">
      <button class="quick-action" data-action="summarize">📝 Summarize</button>
      <button class="quick-action" data-action="explain">💡 Explain</button>
      <button class="quick-action" data-action="translate">🌐 Translate</button>
      <button class="quick-action" data-action="key-points">📌 Key Points</button>
    </div>
    <div class="input-wrapper">
      <textarea id="userInput" placeholder="Ask about this page..." rows="2"></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>
  
  <script>
    const chatContainer = document.getElementById('chatContainer');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    
    // Quick actions
    document.querySelectorAll('.quick-action').forEach(btn => {
      btn.addEventListener('click', () => {
        const action = btn.dataset.action;
        const prompts = {
          'summarize': 'Please summarize this page',
          'explain': 'Please explain this page in simple terms',
          'translate': 'Please translate this page to English',
          'key-points': 'What are the key points of this page?'
        };
        userInput.value = prompts[action] || '';
        sendBtn.click();
      });
    });
    
    sendBtn.addEventListener('click', async () => {
      const message = userInput.value.trim();
      if (!message) return;
      
      // Add user message
      addMessage(message, 'user');
      userInput.value = '';
      
      // Get page info
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });
      
      // Add loading message
      const loadingId = addMessage('Thinking...', 'assistant');
      
      // Open in full app for now (could integrate API later)
      const prompt = `${message}\n\nPage: ${tab.title}\nURL: ${tab.url}`;
      chrome.tabs.create({ url: `http://localhost:3000/chat?prompt=${encodeURIComponent(prompt)}` });
      
      // Update loading message
      document.getElementById(loadingId).textContent = 'Opening in Nairi...';
    });
    
    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendBtn.click();
      }
    });
    
    function addMessage(text, type) {
      const id = 'msg-' + Date.now();
      const div = document.createElement('div');
      div.id = id;
      div.className = `message ${type}`;
      div.textContent = text;
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return id;
    }
  </script>
</body>
</html>
